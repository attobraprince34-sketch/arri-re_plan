version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      # Map an external folder for uploaded/processed images so they persist locally
      - ./media:/app/media
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
    env_file:
      - .env
    depends_on:
      - db
      - redis

  worker:
    build: ./backend
    command: celery -A core worker -l info
    volumes:
      - ./backend:/app
      - ./media:/app/media
    env_file:
      - .env
    environment:
      - DB_HOST=db
    depends_on:
      - db
      - redis
      - web

volumes:
  postgres_data:
